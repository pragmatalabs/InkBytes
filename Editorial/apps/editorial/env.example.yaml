# Editorial service config (ADR-0008). Copy to env.yaml; real secrets via env vars.
database:
  url: __SET_VIA_ENV__        # or set DATABASE_URL (env wins)
  pool_min: 1
  pool_max: 4

# Provider-pluggable LLM. Dev: ollama+gemma4 (Mac). Prod: ollama+gemma4 on the
# Hostinger box, or deepseek fallback. Env overrides: EDITORIAL_LLM_PROVIDER,
# EDITORIAL_LLM_BASE_URL, EDITORIAL_LLM_MODEL, EDITORIAL_LLM_API_KEY.
llm:
  provider: ollama            # ollama | deepseek | anthropic
  base_url: http://localhost:11434/v1
  model: gemma4:12b
  temperature: 0.55
  max_tokens: 1400

editorial:
  window_hours: 24            # morning-briefing cut: cover the prior ~24h
  min_events: 3               # skip a theme below this (don't pad thin days)
  max_events: 12              # top-N events fed to the model
  languages: ["es", "en"]     # "Today's [Topic] Outlook" — bilingual (30 gens/day)

# Self-hosted TTS (ADR-0011). $0/char — Piper (CPU) synthesizes each column ONCE,
# ffmpeg → MP3, uploaded to Spaces; the Reader plays it. Best-effort: a failure
# never blocks the text batch. Voices are baked into the image (see Dockerfile).
# Env overrides: EDITORIAL_TTS_ENABLED, EDITORIAL_TTS_VOICE_EN/_ES, EDITORIAL_TTS_MODELS_DIR.
tts:
  enabled: true
  voices:
    en: en_US-ryan-medium     # warm US male (medium: ~2x faster synth than -high)
    es: es_MX-ald-medium      # matched male narrator, LATAM Spanish
  models_dir: /models
  bitrate: 64k                # mono speech; small files
  key_prefix: audio/outlook   # Spaces key: {prefix}/{date}/{theme}-{lang}.mp3
  concurrency: 1              # voice loaded once; onnxruntime fills the --cpus slice per synth

# DigitalOcean Spaces (S3) — where the MP3s live (public-read). Reuses the shared
# DO_SPACES_* env the stack already carries. Blank key/secret → uploads skipped
# (TTS no-ops) so a mis-set env degrades gracefully. Env overrides: DO_SPACES_ENDPOINT,
# DO_SPACES_REGION, DO_SPACES_BUCKET, DO_SPACES_KEY, DO_SPACES_SECRET, DO_SPACES_PUBLIC_BASE.
spaces:
  endpoint: https://nyc3.digitaloceanspaces.com
  region: nyc3
  bucket: inkbytes-prod
  key: ""                     # via DO_SPACES_KEY
  secret: ""                  # via DO_SPACES_SECRET
  public_base: ""             # optional CDN base; blank → {endpoint}/{bucket}
