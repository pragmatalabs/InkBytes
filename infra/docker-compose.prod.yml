# InkBytes — production stack behind shared Traefik on pragmata-001.
#
# Usage:
#   cp infra/.env.production.example infra/.env  # fill secrets — never commit .env
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d
#
# Two public surfaces:
#   inkbytes-reader      → inkbytes.pragmata.cloud        (Next.js :3000)
#   inkbytes-backoffice  → admin.inkbytes.pragmata.cloud  (nginx :80 → php-fpm)
#
# All other containers live on inkbytes-internal only.
# Host-bound admin ports (127.0.0.1 only, SSH-tunnel access):
#   MinIO console  :9030 → :9001
#   RabbitMQ mgmt  :15683 → :15672

name: inkbytes

networks:
  traefik-public:
    external: true       # shared; created once on host by server-bootstrap.sh
  inkbytes-internal:
    driver: bridge

volumes:
  inkbytes-postgres-data:
  inkbytes-rabbitmq-data:
  inkbytes-minio-data:
  inkbytes-ollama-models:

services:

  # ── PUBLIC: Reader (Next.js) ─────────────────────────────────────────────────
  inkbytes-reader:
    image: ${READER_IMAGE:-registry.digitalocean.com/pragmata/inkbytes-reader:latest}
    container_name: inkbytes-reader
    restart: unless-stopped
    networks:
      - traefik-public
      - inkbytes-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.inkbytes-reader.rule=Host(`${READER_DOMAIN:-inkbytes.pragmata.cloud}`)
      - traefik.http.routers.inkbytes-reader.entrypoints=websecure
      - traefik.http.routers.inkbytes-reader.tls.certresolver=letsencrypt
      - traefik.http.services.inkbytes-reader.loadbalancer.server.port=3000
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inkbytes-postgres:5432/${POSTGRES_DB:-inkbytes}
      CURATOR_API_URL: http://inkbytes-curator-api:8060
      NEXT_PUBLIC_SITE_URL: https://${READER_DOMAIN:-inkbytes.pragmata.cloud}
      INKBYTES_DEMO_PASSWORD: ${INKBYTES_DEMO_PASSWORD:-changeme}
      NODE_ENV: production
    depends_on:
      inkbytes-postgres:    { condition: service_healthy }
      inkbytes-curator-api: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── PUBLIC: Backoffice nginx proxy ───────────────────────────────────────────
  inkbytes-backoffice:
    image: nginx:1.27-alpine
    container_name: inkbytes-backoffice
    restart: unless-stopped
    networks:
      - traefik-public
      - inkbytes-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.inkbytes-backoffice.rule=Host(`${ADMIN_DOMAIN:-admin.inkbytes.pragmata.cloud}`)
      - traefik.http.routers.inkbytes-backoffice.entrypoints=websecure
      - traefik.http.routers.inkbytes-backoffice.tls.certresolver=letsencrypt
      - traefik.http.services.inkbytes-backoffice.loadbalancer.server.port=80
    volumes:
      - ./nginx/backoffice.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      inkbytes-backoffice-fpm: { condition: service_started }

  # ── INTERNAL: Backoffice php-fpm ─────────────────────────────────────────────
  inkbytes-backoffice-fpm:
    image: ${BACKOFFICE_IMAGE:-registry.digitalocean.com/pragmata/inkbytes-backoffice:latest}
    container_name: inkbytes-backoffice-fpm
    restart: unless-stopped
    networks: [inkbytes-internal]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: https://${ADMIN_DOMAIN:-admin.inkbytes.pragmata.cloud}
      # Database (backoffice schema via search_path in pgsql connection)
      DB_CONNECTION: pgsql
      DB_HOST: inkbytes-postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-inkbytes}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Queue (database driver — no Redis needed)
      QUEUE_CONNECTION: database
      # RabbitMQ (for CuratorCommandService — publish moderation commands)
      RABBITMQ_HOST: inkbytes-rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      # Internal service URLs (resolved inside inkbytes-internal)
      CURATOR_URL: http://inkbytes-curator-api:8060
      MESSOR_URL: http://inkbytes-messor:8050
      # S3/MinIO (used for import/export — internal MinIO in prod)
      AWS_ACCESS_KEY_ID: ${MINIO_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET}
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: inkbytes
      AWS_ENDPOINT: http://inkbytes-minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      inkbytes-postgres:  { condition: service_healthy }
      inkbytes-rabbitmq:  { condition: service_healthy }

  # ── INTERNAL: Messor harvester (schedule + API) ──────────────────────────────
  inkbytes-messor:
    image: ${MESSOR_IMAGE:-registry.digitalocean.com/pragmata/inkbytes-messor:latest}
    container_name: inkbytes-messor
    restart: unless-stopped
    networks: [inkbytes-internal]
    environment:
      RABBITMQ_HOST: inkbytes-rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      # DigitalOcean Spaces for article archival (S3-compatible)
      DO_SPACES_KEY: ${DO_SPACES_KEY}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://nyc3.digitaloceanspaces.com}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-inkbytes}
      MESSOR_API_BASE_URL: http://inkbytes-backoffice/api
    depends_on:
      inkbytes-rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8050/api/outlets || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── INTERNAL: Curator API (:8060, --api-only) ────────────────────────────────
  inkbytes-curator-api:
    image: ${CURATOR_IMAGE:-registry.digitalocean.com/pragmata/inkbytes-curator:latest}
    container_name: inkbytes-curator-api
    restart: unless-stopped
    command: ["python", "main.py", "--config", "env.yaml", "--api-only"]
    networks: [inkbytes-internal]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inkbytes-postgres:5432/${POSTGRES_DB:-inkbytes}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@inkbytes-rabbitmq:5672/
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-ollama}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://inkbytes-ollama:11434/v1}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-bge-m3}
      S3_ENDPOINT: http://inkbytes-minio:9000
      S3_KEY: ${MINIO_KEY}
      S3_SECRET: ${MINIO_SECRET}
      S3_BUCKET: inkbytes
    depends_on:
      inkbytes-postgres:  { condition: service_healthy }
      inkbytes-rabbitmq:  { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8060/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── INTERNAL: Curator Worker (--worker, RabbitMQ consumer) ──────────────────
  inkbytes-curator-worker:
    image: ${CURATOR_IMAGE:-registry.digitalocean.com/pragmata/inkbytes-curator:latest}
    container_name: inkbytes-curator-worker
    restart: unless-stopped
    command: ["python", "main.py", "--config", "env.yaml", "--worker"]
    networks: [inkbytes-internal]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inkbytes-postgres:5432/${POSTGRES_DB:-inkbytes}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@inkbytes-rabbitmq:5672/
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-ollama}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://inkbytes-ollama:11434/v1}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-bge-m3}
      S3_ENDPOINT: http://inkbytes-minio:9000
      S3_KEY: ${MINIO_KEY}
      S3_SECRET: ${MINIO_SECRET}
      S3_BUCKET: inkbytes
    depends_on:
      inkbytes-postgres:  { condition: service_healthy }
      inkbytes-rabbitmq:  { condition: service_healthy }
      inkbytes-ollama:    { condition: service_healthy }

  # ── STATEFUL: Postgres + pgvector ───────────────────────────────────────────
  inkbytes-postgres:
    image: pgvector/pgvector:pg16
    container_name: inkbytes-postgres
    restart: unless-stopped
    networks: [inkbytes-internal]
    volumes:
      - inkbytes-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inkbytes}
      POSTGRES_USER: ${POSTGRES_USER:-inkbytes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inkbytes} -d ${POSTGRES_DB:-inkbytes}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── STATEFUL: RabbitMQ ───────────────────────────────────────────────────────
  inkbytes-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: inkbytes-rabbitmq
    restart: unless-stopped
    networks: [inkbytes-internal]
    volumes:
      - inkbytes-rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      # Management UI — 127.0.0.1 ONLY; access via SSH tunnel: ssh -L 15683:localhost:15683 root@pragmata-001
      - "127.0.0.1:15683:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── STATEFUL: MinIO (S3-compatible object store) ─────────────────────────────
  inkbytes-minio:
    image: minio/minio:latest
    container_name: inkbytes-minio
    restart: unless-stopped
    networks: [inkbytes-internal]
    volumes:
      - inkbytes-minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET}
    command: server /data --console-address ":9001"
    ports:
      # Console — 127.0.0.1 ONLY; access via SSH tunnel: ssh -L 9030:localhost:9030 root@pragmata-001
      - "127.0.0.1:9030:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── INIT: Create MinIO bucket ─────────────────────────────────────────────────
  inkbytes-minio-init:
    image: minio/mc:latest
    container_name: inkbytes-minio-init
    restart: "no"
    networks: [inkbytes-internal]
    depends_on:
      inkbytes-minio: { condition: service_healthy }
    environment:
      MINIO_KEY: ${MINIO_KEY}
      MINIO_SECRET: ${MINIO_SECRET}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://inkbytes-minio:9000 $$MINIO_KEY $$MINIO_SECRET &&
        mc mb --ignore-existing local/inkbytes &&
        echo 'MinIO bucket inkbytes ready.'
      "

  # ── STATEFUL: Ollama (local embeddings — bge-m3) ─────────────────────────────
  inkbytes-ollama:
    image: ollama/ollama:latest
    container_name: inkbytes-ollama
    restart: unless-stopped
    networks: [inkbytes-internal]
    volumes:
      - inkbytes-ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── INIT: Pull bge-m3 model ───────────────────────────────────────────────────
  inkbytes-ollama-init:
    image: ollama/ollama:latest
    container_name: inkbytes-ollama-init
    restart: "no"
    networks: [inkbytes-internal]
    depends_on:
      inkbytes-ollama: { condition: service_healthy }
    environment:
      OLLAMA_HOST: http://inkbytes-ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull bge-m3 && echo 'bge-m3 ready.'"]
