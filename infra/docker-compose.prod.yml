# InkBytes — production stack behind shared Traefik on pragmata-001.
#
# Usage:
#   cp infra/.env.production.example infra/.env  # fill secrets — never commit .env
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d
#
# Two public surfaces:
#   inkbytes-reader      → inkbytes.galvanic.cloud        (Next.js :3000)
#   inkbytes-backoffice  → admin.inkbytes.galvanic.cloud  (nginx :80 → php-fpm)
#
# All other containers live on inkbytes-internal only.
# Host-bound admin ports (127.0.0.1 only, SSH-tunnel access):
#   MinIO console  :9030 → :9001
#   RabbitMQ mgmt  :15683 → :15672
#
# Memory limits prevent OOM crashes on shared host.
# Total reserved: ~9.5 GB — leaves ~5.5 GB for OS, Ollama (bge-m3 ~1.6 GB cap 3 GB), other projects.
# Ollama mem_limit set to 3g in /docker/galvanic/docker-compose.yml (was 10g; bge-m3 peaks at 1.6 GB).
# RabbitMQ: 1g/1.5CPU cap added 2026-06-07 — was uncapped (MemLimit=0); 512m OOM'd during queue recovery.

name: inkbytes

networks:
  inkbytes-internal:
    driver: bridge

volumes:
  # external:true → Compose treats these as pre-existing and will NEVER delete
  # them on `docker compose down -v`. This neutralises the exact accident that
  # wiped the dedup volume during the ADR-0016 migration (Messor ADR-0014).
  # `name:` pins the EXISTING project-prefixed volume so no data is moved or
  # orphaned; without it, external:true would resolve to an unprefixed (empty)
  # volume and silently mount blank storage. deploy.sh creates these if absent
  # (fresh host) since Compose errors on a missing external volume.
  inkbytes-postgres-data:
    external: true
    name: inkbytes_inkbytes-postgres-data
  inkbytes-rabbitmq-data:
  inkbytes-messor-scrapes:   # staging files — persists URL dedup across container restarts (ADR-0012)
    external: true
    name: inkbytes_inkbytes-messor-scrapes

services:

  # ── PUBLIC: Reader (Next.js) ─────────────────────────────────────────────────
  # Traefik on this host uses file-based routing (host network mode).
  # Reader publishes 127.0.0.1:18050 so Traefik can reach it at localhost.
  # The /docker/traefik/config/inkbytes.yml file maps the domain to this port.
  inkbytes-reader:
    image: ${READER_IMAGE:-ghcr.io/pragmatalabs/inkbytes-reader:latest}
    container_name: inkbytes-reader
    restart: unless-stopped
    networks: [inkbytes-internal]
    ports:
      - "127.0.0.1:18050:3000"

    mem_limit: 512m
    cpus: 1.0
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inkbytes-postgres:5432/${POSTGRES_DB:-inkbytes}
      CURATOR_API_URL: http://inkbytes-curator-api:8060
      NEXT_PUBLIC_SITE_URL: https://${READER_DOMAIN:-inkbytes.galvanic.cloud}
      INKBYTES_DEMO_PASSWORD: ${INKBYTES_DEMO_PASSWORD:-}   # blank = open access (no login required)
      NODE_ENV: production
      # Self-hosted Umami analytics (read at runtime by components/analytics.tsx).
      # Blank → inert. Set in infra/.env AFTER Umami first-run: UMAMI_SRC =
      # https://${ANALYTICS_DOMAIN}/script.js, UMAMI_WEBSITE_ID = the dashboard UUID.
      UMAMI_SRC: ${UMAMI_SRC:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    depends_on:
      inkbytes-postgres:    { condition: service_healthy }
      inkbytes-curator-api: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3000/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── PUBLIC: Backoffice (nginx + php-fpm in one container via supervisord) ─────
  inkbytes-backoffice:
    image: ${BACKOFFICE_IMAGE:-ghcr.io/pragmatalabs/inkbytes-backoffice:latest}
    container_name: inkbytes-backoffice
    restart: unless-stopped
    networks: [inkbytes-internal]
    ports:
      - "127.0.0.1:18051:80"

    mem_limit: 512m
    cpus: 1.0
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: https://${ADMIN_DOMAIN:-admin.inkbytes.galvanic.cloud}
      DB_CONNECTION: pgsql
      DB_HOST: inkbytes-postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-inkbytes}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_CONNECTION: database
      RABBITMQ_HOST: inkbytes-rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CURATOR_URL: http://inkbytes-curator-api:8060
      MESSOR_URL: http://inkbytes-messor:8050
      AWS_ACCESS_KEY_ID: ${DO_SPACES_KEY}
      AWS_SECRET_ACCESS_KEY: ${DO_SPACES_SECRET}
      AWS_DEFAULT_REGION: nyc3
      AWS_BUCKET: ${DO_SPACES_BUCKET:-inkbytes-prod}
      AWS_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://nyc3.digitaloceanspaces.com}
      # Scraping trigger — messor-trigger.sh parses {SCRAPE_ARGS} (outlets/limit),
      # POSTs to Messor's internal trigger endpoint, echoes status to the job log.
      SCRAPING_COMMAND: "/usr/local/bin/messor-trigger {SCRAPE_ARGS}"
      # RabbitMQ management API — used by CuratorCommandService to publish
      # moderation commands (re-embed, re-synthesize, publish/unpublish).
      # Default is localhost:15672 which doesn't work inside Docker.
      RABBITMQ_MANAGEMENT_URL: http://inkbytes-rabbitmq:15672
      # Runtime Monitor — reach Docker through the read-only socket proxy, NOT
      # the raw host socket (that would grant host-root to this public admin
      # app). The proxy only exposes GET /containers + /info.
      RUNTIME_MONITOR_PROJECT: inkbytes
      RUNTIME_MONITOR_DOCKER_HOST: http://docker-socket-proxy:2375
    depends_on:
      inkbytes-postgres: { condition: service_healthy }
      inkbytes-rabbitmq: { condition: service_healthy }

  # ── INTERNAL: read-only Docker API proxy for the Runtime Monitor ─────────────
  # Hardened gateway so the public Backoffice never touches the raw host socket
  # (which is host-root). Exposes ONLY GET /containers + /info over TCP on the
  # internal network; all mutating verbs are denied (POST=0, default-deny).
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    container_name: inkbytes-docker-proxy
    restart: unless-stopped
    networks: [inkbytes-internal]
    mem_limit: 64m
    environment:
      CONTAINERS: "1"   # GET /containers/json, /{id}/json, /{id}/stats, /{id}/top
      INFO: "1"         # GET /info (compose project detection)
      POST: "0"         # deny all writes (also the default)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── INTERNAL: Messor harvester (schedule + API) ──────────────────────────────
  inkbytes-messor:
    image: ${MESSOR_IMAGE:-ghcr.io/pragmatalabs/inkbytes-messor:latest}
    container_name: inkbytes-messor
    restart: unless-stopped
    networks: [inkbytes-internal]

    mem_limit: 6g
    cpus: 2.0
    environment:
      RABBITMQ_HOST: inkbytes-rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      # Wait this many minutes before the first scrape cycle after (re)start.
      # Prevents back-to-back sweeps during crash-restart loops.
      MESSOR_STARTUP_DELAY_MINUTES: "5"
      MESSOR_SCHEDULE_INTERVAL_MINUTES: "120"   # 12×/day (every 2 h); manual trigger via Backoffice anytime
      # DigitalOcean Spaces for article archival (S3-compatible)
      DO_SPACES_KEY: ${DO_SPACES_KEY}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://nyc3.digitaloceanspaces.com}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-inkbytes-prod}
      # MESSOR_API_BASE_URL removed — legacy endpoint (B12.3 decommissioned)
    volumes:
      # Persist staging files across container restarts/deploys so URL dedup
      # (load_known_article_urls) survives.  Without this, every restart wiped
      # data/scrapes/ → all articles published as "new" → queue flood (ADR-0012).
      - inkbytes-messor-scrapes:/app/apps/scraper/data/scrapes
    depends_on:
      inkbytes-rabbitmq: { condition: service_healthy }
    healthcheck:
      # python:3.11-slim has no curl; use Python's stdlib urllib instead.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8050/api/outlets', timeout=3)\" || exit 1"]
      interval: 30s
      timeout: 8s
      retries: 5

  # ── INTERNAL: Curator API (:8060, --api-only) ────────────────────────────────
  inkbytes-curator-api:
    image: ${CURATOR_IMAGE:-ghcr.io/pragmatalabs/inkbytes-curator:latest}
    container_name: inkbytes-curator-api
    restart: unless-stopped
    command: ["python", "main.py", "--config", "env.yaml", "--api-only"]
    networks: [inkbytes-internal]
    extra_hosts:
      - "host.docker.internal:host-gateway"

    mem_limit: 512m
    cpus: 1.0
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inkbytes-postgres:5432/${POSTGRES_DB:-inkbytes}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@inkbytes-rabbitmq:5672/
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-ollama}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://ollama:11434/v1}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-bge-m3}
      # Pre-enrich triage gate (Curator ADR-0030). Off by default; ships in shadow.
      TRIAGE_ENABLED: ${TRIAGE_ENABLED:-false}
      TRIAGE_SHADOW: ${TRIAGE_SHADOW:-true}
      TRIAGE_BASE_URL: ${TRIAGE_BASE_URL:-http://ollama:11434/v1}
      TRIAGE_MODEL: ${TRIAGE_MODEL:-llama3.2:3b}
      # Event lifecycle (Curator ADR-0033 P0). Defaults dormant — set in
      # infra/.env to activate. LIFECYCLE_FEED/FEED_WINDOW_HOURS → feed
      # ranking+window; MATERIAL_MAX_DISTANCE → cluster attach gate (0.50=no-op,
      # 0.40 activates); CONCLUDE_AFTER_DAYS → archiving (0=off; needs the job run).
      LIFECYCLE_FEED: ${LIFECYCLE_FEED:-false}
      FEED_WINDOW_HOURS: ${FEED_WINDOW_HOURS:-72}
      MATERIAL_MAX_DISTANCE: ${MATERIAL_MAX_DISTANCE:-0.50}
      CONCLUDE_AFTER_DAYS: ${CONCLUDE_AFTER_DAYS:-0}
      # Clustering precision (ADR-0031). Off by default; enable after backfilling
      # events.centroid. Stops new mega-buckets (centroid-linkage + specificity).
      PRECISION_MODE: ${PRECISION_MODE:-false}
      PRECISION_DISTANCE: ${PRECISION_DISTANCE:-0.30}
      SPECIFICITY_CAP: ${SPECIFICITY_CAP:-0.05}
      SPECIFICITY_MAX_DF: ${SPECIFICITY_MAX_DF:-90}
      SPECIFICITY_MIN_SHARED: ${SPECIFICITY_MIN_SHARED:-2}
      S3_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://nyc3.digitaloceanspaces.com}
      S3_KEY: ${DO_SPACES_KEY}
      S3_SECRET: ${DO_SPACES_SECRET}
      S3_BUCKET: ${DO_SPACES_BUCKET:-inkbytes-prod}
      # ADR-0034 Tier 2 cover source. Blank → Unsplash skipped (Openverse/Wikimedia
      # still work). Register an app at unsplash.com/developers for the Access Key.
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
      # Web Push / "Daily Outlook ready" PWA notifications (ADR-R-0012). Push is
      # a no-op until VAPID keys are set. Only the API serves push (subscribe +
      # broadcast); the worker doesn't need these.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:hello@inkbytes.org}
      PUSH_TRIGGER_SECRET: ${PUSH_TRIGGER_SECRET:-}
    depends_on:
      inkbytes-postgres:  { condition: service_healthy }
      inkbytes-rabbitmq:  { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8060/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── INTERNAL: Curator Worker (--worker, RabbitMQ consumer) ──────────────────
  inkbytes-curator-worker:
    image: ${CURATOR_IMAGE:-ghcr.io/pragmatalabs/inkbytes-curator:latest}
    container_name: inkbytes-curator-worker
    restart: unless-stopped
    command: ["python", "main.py", "--config", "env.yaml", "--worker"]
    networks: [inkbytes-internal]
    extra_hosts:
      - "host.docker.internal:host-gateway"

    mem_limit: 1g
    cpus: 2.0
    # Override image healthcheck: worker has no HTTP port — just check process is alive
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"open('/proc/1/cmdline').read()\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inkbytes-postgres:5432/${POSTGRES_DB:-inkbytes}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@inkbytes-rabbitmq:5672/
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-ollama}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://ollama:11434/v1}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-bge-m3}
      # Pre-enrich triage gate (Curator ADR-0030). Off by default; ships in shadow.
      TRIAGE_ENABLED: ${TRIAGE_ENABLED:-false}
      TRIAGE_SHADOW: ${TRIAGE_SHADOW:-true}
      TRIAGE_BASE_URL: ${TRIAGE_BASE_URL:-http://ollama:11434/v1}
      TRIAGE_MODEL: ${TRIAGE_MODEL:-llama3.2:3b}
      # Event lifecycle (Curator ADR-0033 P0). Defaults dormant — set in
      # infra/.env to activate. LIFECYCLE_FEED/FEED_WINDOW_HOURS → feed
      # ranking+window; MATERIAL_MAX_DISTANCE → cluster attach gate (0.50=no-op,
      # 0.40 activates); CONCLUDE_AFTER_DAYS → archiving (0=off; needs the job run).
      LIFECYCLE_FEED: ${LIFECYCLE_FEED:-false}
      FEED_WINDOW_HOURS: ${FEED_WINDOW_HOURS:-72}
      MATERIAL_MAX_DISTANCE: ${MATERIAL_MAX_DISTANCE:-0.50}
      CONCLUDE_AFTER_DAYS: ${CONCLUDE_AFTER_DAYS:-0}
      # Clustering precision (ADR-0031). Off by default; enable after backfilling
      # events.centroid. Stops new mega-buckets (centroid-linkage + specificity).
      PRECISION_MODE: ${PRECISION_MODE:-false}
      PRECISION_DISTANCE: ${PRECISION_DISTANCE:-0.30}
      SPECIFICITY_CAP: ${SPECIFICITY_CAP:-0.05}
      SPECIFICITY_MAX_DF: ${SPECIFICITY_MAX_DF:-90}
      SPECIFICITY_MIN_SHARED: ${SPECIFICITY_MIN_SHARED:-2}
      S3_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://nyc3.digitaloceanspaces.com}
      S3_KEY: ${DO_SPACES_KEY}
      S3_SECRET: ${DO_SPACES_SECRET}
      S3_BUCKET: ${DO_SPACES_BUCKET:-inkbytes-prod}
      # ADR-0034 Tier 2 cover source. Blank → Unsplash skipped (Openverse/Wikimedia
      # still work). Register an app at unsplash.com/developers for the Access Key.
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
    depends_on:
      inkbytes-postgres:  { condition: service_healthy }
      inkbytes-rabbitmq:  { condition: service_healthy }
      # Ollama runs on the host — no depends_on needed (reached via host.docker.internal)

  # ── ANALYTICS: Umami (self-hosted, privacy-first, cookieless) ────────────────
  # Visitor + content-engagement analytics for the Reader. Data lives in a
  # SEPARATE `umami` database on the existing Postgres — create it once:
  #   docker exec inkbytes-postgres psql -U "$POSTGRES_USER" -c 'CREATE DATABASE umami'
  # Umami runs its own Prisma migrations on boot. Dashboard + tracking script are
  # served at ${ANALYTICS_DOMAIN} (needs a DNS A record → droplet; Traefik labels
  # live in docker-compose.do.yml). APP_SECRET must be set in infra/.env.
  inkbytes-umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: inkbytes-umami
    restart: unless-stopped
    networks: [inkbytes-internal]
    ports:
      - "127.0.0.1:18052:3000"
    mem_limit: 384m
    cpus: 1.0
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inkbytes-postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      inkbytes-postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/heartbeat',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── STATEFUL: Postgres + pgvector ───────────────────────────────────────────
  inkbytes-postgres:
    image: pgvector/pgvector:pg16
    container_name: inkbytes-postgres
    restart: unless-stopped
    networks: [inkbytes-internal]
    volumes:
      - inkbytes-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inkbytes}
      POSTGRES_USER: ${POSTGRES_USER:-inkbytes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inkbytes} -d ${POSTGRES_DB:-inkbytes}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── STATEFUL: RabbitMQ ───────────────────────────────────────────────────────
  inkbytes-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: inkbytes-rabbitmq
    restart: unless-stopped
    networks: [inkbytes-internal]
    volumes:
      - inkbytes-rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

    mem_limit: 1g
    cpus: 1.5
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      # Management UI — 127.0.0.1 ONLY; access via SSH tunnel: ssh -L 15683:localhost:15683 root@pragmata-001
      - "127.0.0.1:15683:15672"
    healthcheck:
      # rabbitmq-diagnostics ping can be slow on resource-constrained VPS;
      # increase timeout + start_period to avoid false unhealthy on restart.
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 60s

  # Ollama: uses host's existing Ollama instance (bge-m3 pulled separately).
  # Curator containers reach it at http://ollama:11434/v1
  # To pull bge-m3:  docker exec ollama ollama pull bge-m3
