# InkBytes — production stack behind shared Traefik on pragmata-001.
#
# Usage:
#   cp infra/.env.production.example infra/.env  # fill secrets — never commit .env
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d
#
# Two public surfaces:
#   inkbytes-reader      → inkbytes.galvanic.cloud        (Next.js :3000)
#   inkbytes-backoffice  → admin.inkbytes.galvanic.cloud  (nginx :80 → php-fpm)
#
# All other containers live on inkbytes-internal only.
# Host-bound admin ports (127.0.0.1 only, SSH-tunnel access):
#   MinIO console  :9030 → :9001
#   RabbitMQ mgmt  :15683 → :15672
#
# Memory limits prevent OOM crashes on shared host.
# Total reserved: ~8.5 GB — leaves ~6.5 GB for OS, Ollama (bge-m3 ~1.6 GB cap 3 GB), other projects.
# Ollama mem_limit set to 3g in /docker/galvanic/docker-compose.yml (was 10g; bge-m3 peaks at 1.6 GB).

name: inkbytes

networks:
  inkbytes-internal:
    driver: bridge

volumes:
  inkbytes-postgres-data:
  inkbytes-rabbitmq-data:
  inkbytes-minio-data:

services:

  # ── PUBLIC: Reader (Next.js) ─────────────────────────────────────────────────
  # Traefik on this host uses file-based routing (host network mode).
  # Reader publishes 127.0.0.1:18050 so Traefik can reach it at localhost.
  # The /docker/traefik/config/inkbytes.yml file maps the domain to this port.
  inkbytes-reader:
    image: ${READER_IMAGE:-ghcr.io/pragmatalabs/inkbytes-reader:latest}
    container_name: inkbytes-reader
    restart: unless-stopped
    networks: [inkbytes-internal]
    ports:
      - "127.0.0.1:18050:3000"

    mem_limit: 512m
    cpus: 1.0
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inkbytes-postgres:5432/${POSTGRES_DB:-inkbytes}
      CURATOR_API_URL: http://inkbytes-curator-api:8060
      NEXT_PUBLIC_SITE_URL: https://${READER_DOMAIN:-inkbytes.galvanic.cloud}
      INKBYTES_DEMO_PASSWORD: ${INKBYTES_DEMO_PASSWORD:-}   # blank = open access (no login required)
      NODE_ENV: production
    depends_on:
      inkbytes-postgres:    { condition: service_healthy }
      inkbytes-curator-api: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3000/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── PUBLIC: Backoffice (nginx + php-fpm in one container via supervisord) ─────
  inkbytes-backoffice:
    image: ${BACKOFFICE_IMAGE:-ghcr.io/pragmatalabs/inkbytes-backoffice:latest}
    container_name: inkbytes-backoffice
    restart: unless-stopped
    networks: [inkbytes-internal]
    ports:
      - "127.0.0.1:18051:80"

    mem_limit: 512m
    cpus: 1.0
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: https://${ADMIN_DOMAIN:-admin.inkbytes.galvanic.cloud}
      DB_CONNECTION: pgsql
      DB_HOST: inkbytes-postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-inkbytes}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_CONNECTION: database
      RABBITMQ_HOST: inkbytes-rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CURATOR_URL: http://inkbytes-curator-api:8060
      MESSOR_URL: http://inkbytes-messor:8050
      AWS_ACCESS_KEY_ID: ${MINIO_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET}
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: inkbytes
      AWS_ENDPOINT: http://inkbytes-minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      # Scraping trigger — messor-trigger.sh parses {SCRAPE_ARGS} (outlets/limit),
      # POSTs to Messor's internal trigger endpoint, echoes status to the job log.
      SCRAPING_COMMAND: "/usr/local/bin/messor-trigger {SCRAPE_ARGS}"
      # RabbitMQ management API — used by CuratorCommandService to publish
      # moderation commands (re-embed, re-synthesize, publish/unpublish).
      # Default is localhost:15672 which doesn't work inside Docker.
      RABBITMQ_MANAGEMENT_URL: http://inkbytes-rabbitmq:15672
    depends_on:
      inkbytes-postgres: { condition: service_healthy }
      inkbytes-rabbitmq: { condition: service_healthy }

  # ── INTERNAL: Messor harvester (schedule + API) ──────────────────────────────
  inkbytes-messor:
    image: ${MESSOR_IMAGE:-ghcr.io/pragmatalabs/inkbytes-messor:latest}
    container_name: inkbytes-messor
    restart: unless-stopped
    networks: [inkbytes-internal]

    mem_limit: 6g
    cpus: 2.0
    environment:
      RABBITMQ_HOST: inkbytes-rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      # Wait this many minutes before the first scrape cycle after (re)start.
      # Prevents back-to-back sweeps during crash-restart loops.
      MESSOR_STARTUP_DELAY_MINUTES: "5"
      # DigitalOcean Spaces for article archival (S3-compatible)
      DO_SPACES_KEY: ${DO_SPACES_KEY}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://nyc3.digitaloceanspaces.com}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-inkbytes}
      # MESSOR_API_BASE_URL removed — legacy endpoint (B12.3 decommissioned)
    depends_on:
      inkbytes-rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8050/api/outlets || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── INTERNAL: Curator API (:8060, --api-only) ────────────────────────────────
  inkbytes-curator-api:
    image: ${CURATOR_IMAGE:-ghcr.io/pragmatalabs/inkbytes-curator:latest}
    container_name: inkbytes-curator-api
    restart: unless-stopped
    command: ["python", "main.py", "--config", "env.yaml", "--api-only"]
    networks: [inkbytes-internal]
    extra_hosts:
      - "host.docker.internal:host-gateway"

    mem_limit: 512m
    cpus: 1.0
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inkbytes-postgres:5432/${POSTGRES_DB:-inkbytes}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@inkbytes-rabbitmq:5672/
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-ollama}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://host.docker.internal:11434/v1}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-bge-m3}
      S3_ENDPOINT: http://inkbytes-minio:9000
      S3_KEY: ${MINIO_KEY}
      S3_SECRET: ${MINIO_SECRET}
      S3_BUCKET: inkbytes
    depends_on:
      inkbytes-postgres:  { condition: service_healthy }
      inkbytes-rabbitmq:  { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8060/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── INTERNAL: Curator Worker (--worker, RabbitMQ consumer) ──────────────────
  inkbytes-curator-worker:
    image: ${CURATOR_IMAGE:-ghcr.io/pragmatalabs/inkbytes-curator:latest}
    container_name: inkbytes-curator-worker
    restart: unless-stopped
    command: ["python", "main.py", "--config", "env.yaml", "--worker"]
    networks: [inkbytes-internal]
    extra_hosts:
      - "host.docker.internal:host-gateway"

    mem_limit: 1g
    cpus: 2.0
    # Override image healthcheck: worker has no HTTP port — just check process is alive
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"open('/proc/1/cmdline').read()\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inkbytes-postgres:5432/${POSTGRES_DB:-inkbytes}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@inkbytes-rabbitmq:5672/
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-ollama}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://host.docker.internal:11434/v1}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-bge-m3}
      S3_ENDPOINT: http://inkbytes-minio:9000
      S3_KEY: ${MINIO_KEY}
      S3_SECRET: ${MINIO_SECRET}
      S3_BUCKET: inkbytes
    depends_on:
      inkbytes-postgres:  { condition: service_healthy }
      inkbytes-rabbitmq:  { condition: service_healthy }
      # Ollama runs on the host — no depends_on needed (reached via host.docker.internal)

  # ── STATEFUL: Postgres + pgvector ───────────────────────────────────────────
  inkbytes-postgres:
    image: pgvector/pgvector:pg16
    container_name: inkbytes-postgres
    restart: unless-stopped
    networks: [inkbytes-internal]
    volumes:
      - inkbytes-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inkbytes}
      POSTGRES_USER: ${POSTGRES_USER:-inkbytes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inkbytes} -d ${POSTGRES_DB:-inkbytes}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── STATEFUL: RabbitMQ ───────────────────────────────────────────────────────
  inkbytes-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: inkbytes-rabbitmq
    restart: unless-stopped
    networks: [inkbytes-internal]
    volumes:
      - inkbytes-rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      # Management UI — 127.0.0.1 ONLY; access via SSH tunnel: ssh -L 15683:localhost:15683 root@pragmata-001
      - "127.0.0.1:15683:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── STATEFUL: MinIO (S3-compatible object store) ─────────────────────────────
  inkbytes-minio:
    image: minio/minio:latest
    container_name: inkbytes-minio
    restart: unless-stopped
    networks: [inkbytes-internal]
    volumes:
      - inkbytes-minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET}
    command: server /data --console-address ":9001"
    ports:
      # Console — 127.0.0.1 ONLY; access via SSH tunnel: ssh -L 9030:localhost:9030 root@pragmata-001
      - "127.0.0.1:9030:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── INIT: Create MinIO bucket ─────────────────────────────────────────────────
  inkbytes-minio-init:
    image: minio/mc:latest
    container_name: inkbytes-minio-init
    restart: "no"
    networks: [inkbytes-internal]
    depends_on:
      inkbytes-minio: { condition: service_healthy }
    environment:
      MINIO_KEY: ${MINIO_KEY}
      MINIO_SECRET: ${MINIO_SECRET}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://inkbytes-minio:9000 $$MINIO_KEY $$MINIO_SECRET &&
        mc mb --ignore-existing local/inkbytes &&
        echo 'MinIO bucket inkbytes ready.'
      "

  # Ollama: uses host's existing Ollama instance (bge-m3 pulled separately).
  # Curator containers reach it at http://host.docker.internal:11434/v1
  # To pull bge-m3:  docker exec ollama ollama pull bge-m3
