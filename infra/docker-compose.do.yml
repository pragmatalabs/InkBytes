# DigitalOcean override (pragmata-001)
# - Reduces mem limits for 7.8 GB droplet
# - Adds Traefik label routing (DO uses Docker-socket labels, not file-based)
# - Joins traefik-public network so Traefik can reach reader + backoffice

networks:
  traefik-public:
    external: true
    name: traefik-public

services:
  inkbytes-messor:
    mem_limit: 2g

  inkbytes-curator-worker:
    mem_limit: 1.5g  # raised from 768m — IllustrateSkill opens 2 Chromium instances (~400 MB peak)
    shm_size: '256m'  # Chromium needs shared memory even with --disable-dev-shm-usage
    security_opt:
      - seccomp:unconfined  # Docker's default seccomp blocks clone() flags Chromium needs → SIGTRAP
    # IllustrateSkill launches headless Chromium for YouTube. When a launch
    # crashes, Chromium's helper processes get reparented to PID 1; the bare
    # python main.py is NOT a subreaper, so they pile up as zombies. Over days
    # this exhausted the PID table (~9.3k chrome procs → pthread_create EAGAIN →
    # every launch SIGTRAPs → no video rail). `init: true` runs tini as PID 1 to
    # reap them; `pids_limit` caps the blast radius so a future leak can't eat
    # the whole shared droplet's process table (it was unbounded). 2026-06-25.
    init: true
    pids_limit: 4096
    environment:
      # Embeddings offloaded to the Hostinger Ollama box (Curator ADR-0026,
      # 2026-06-11). The DO droplet's CPU-only Ollama embedded bge-m3 in ~15s
      # under scrape-time contention, serialized through _embed_sem → ~4/min
      # pipeline ceiling → permanent queue backlog. The Hostinger box
      # (82.112.250.139, 16GB, idle) runs the SAME bge-m3 (same 1024-dim vector
      # space → zero re-embed) at ~2.2s warm → ~27/min. Port 32768 is firewalled
      # to this droplet's IP only. OpenAI-compatible /v1 endpoint.
      EMBEDDINGS_PROVIDER: ollama
      EMBEDDINGS_BASE_URL: "${EMBEDDINGS_BASE_URL:-http://82.112.250.139:32768/v1}"
      EMBEDDINGS_MODEL: bge-m3

  inkbytes-curator-api:
    mem_limit: 384m
    environment:
      EMBEDDINGS_PROVIDER: ollama
      EMBEDDINGS_BASE_URL: "http://infra-ollama:11434/v1"
      EMBEDDINGS_MODEL: bge-m3

  inkbytes-reader:
    mem_limit: 384m
    networks:
      - inkbytes-internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.inkbytes-reader.rule=Host(`${READER_DOMAIN:-inkbytes.org}`)"
      - "traefik.http.routers.inkbytes-reader.entrypoints=websecure"
      - "traefik.http.routers.inkbytes-reader.tls.certresolver=letsencrypt"
      - "traefik.http.services.inkbytes-reader.loadbalancer.server.port=3000"
      # Flood / DDoS hardening (security). Per-IP rate-limit + concurrent-request
      # cap at the edge. Defaults limit by client IP (RemoteAddr — spoof-resistant,
      # no X-Forwarded-For trust). Values are generous for humans (lead images are
      # cross-origin from outlet CDNs, so a page load hits this origin ~5-15×) and
      # brutal for a flood (which does thousands/s). Names are inkbytes-prefixed so
      # they don't collide on the shared Traefik. Tune average/burst if false 429s.
      - "traefik.http.routers.inkbytes-reader.middlewares=inkbytes-reader-ratelimit,inkbytes-reader-inflight"
      - "traefik.http.middlewares.inkbytes-reader-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.inkbytes-reader-ratelimit.ratelimit.burst=200"
      - "traefik.http.middlewares.inkbytes-reader-inflight.inflightreq.amount=100"

  inkbytes-backoffice:
    mem_limit: 384m
    networks:
      - inkbytes-internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.inkbytes-backoffice.rule=Host(`${ADMIN_DOMAIN:-admin.inkbytes.org}`)"
      - "traefik.http.routers.inkbytes-backoffice.entrypoints=websecure"
      - "traefik.http.routers.inkbytes-backoffice.tls.certresolver=letsencrypt"
      - "traefik.http.services.inkbytes-backoffice.loadbalancer.server.port=80"
      # Flood / brute-force hardening (security). Tighter than the Reader — the
      # admin is a single-user tool, so a low ceiling is safe and also caps
      # login-POST flooding at the edge (on top of Breeze's per-credential
      # lockout + the throttle:10,1 route middleware).
      - "traefik.http.routers.inkbytes-backoffice.middlewares=inkbytes-backoffice-ratelimit,inkbytes-backoffice-inflight"
      - "traefik.http.middlewares.inkbytes-backoffice-ratelimit.ratelimit.average=30"
      - "traefik.http.middlewares.inkbytes-backoffice-ratelimit.ratelimit.burst=60"
      - "traefik.http.middlewares.inkbytes-backoffice-inflight.inflightreq.amount=40"
