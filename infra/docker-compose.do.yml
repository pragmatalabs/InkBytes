# DigitalOcean override (pragmata-001)
# - Reduces mem limits for 7.8 GB droplet
# - Adds Traefik label routing (DO uses Docker-socket labels, not file-based)
# - Joins traefik-public network so Traefik can reach reader + backoffice

networks:
  traefik-public:
    external: true
    name: traefik-public

services:
  inkbytes-messor:
    mem_limit: 2g

  inkbytes-curator-worker:
    mem_limit: 1.5g  # raised from 768m — IllustrateSkill opens 2 Chromium instances (~400 MB peak)
    shm_size: '256m'  # Chromium needs shared memory even with --disable-dev-shm-usage
    security_opt:
      - seccomp:unconfined  # Docker's default seccomp blocks clone() flags Chromium needs → SIGTRAP
    environment:
      # On DO, Ollama runs as infra-ollama (infra-shared network).
      # infra-ollama is connected to inkbytes-internal at deploy time (see deploy.sh).
      EMBEDDINGS_PROVIDER: ollama
      EMBEDDINGS_BASE_URL: "http://infra-ollama:11434/v1"
      EMBEDDINGS_MODEL: bge-m3

  inkbytes-curator-api:
    mem_limit: 384m
    environment:
      EMBEDDINGS_PROVIDER: ollama
      EMBEDDINGS_BASE_URL: "http://infra-ollama:11434/v1"
      EMBEDDINGS_MODEL: bge-m3

  inkbytes-reader:
    mem_limit: 384m
    networks:
      - inkbytes-internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.inkbytes-reader.rule=Host(`${READER_DOMAIN:-inkbytes.org}`)"
      - "traefik.http.routers.inkbytes-reader.entrypoints=websecure"
      - "traefik.http.routers.inkbytes-reader.tls.certresolver=letsencrypt"
      - "traefik.http.services.inkbytes-reader.loadbalancer.server.port=3000"

  inkbytes-backoffice:
    mem_limit: 384m
    networks:
      - inkbytes-internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.inkbytes-backoffice.rule=Host(`${ADMIN_DOMAIN:-admin.inkbytes.org}`)"
      - "traefik.http.routers.inkbytes-backoffice.entrypoints=websecure"
      - "traefik.http.routers.inkbytes-backoffice.tls.certresolver=letsencrypt"
      - "traefik.http.services.inkbytes-backoffice.loadbalancer.server.port=80"
