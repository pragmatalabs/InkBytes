## RabbitMQ configuration for InkBytes production
##
## consumer_timeout: disabled (undefined) — Curator's clustering step can
## take many minutes when processing a large backlog; the default 30-min
## timeout would close channels before the ACK is sent.
## Set via: rabbitmqctl eval "application:set_env(rabbit, consumer_timeout, undefined)."
consumer_timeout = 3600000

## Memory high-watermark — RabbitMQ will flow-control producers above this
## fraction of available memory (default 0.4 = 40%).
## With mem_limit=1g this triggers at ~400 MB; raise slightly.
vm_memory_high_watermark.relative = 0.6
