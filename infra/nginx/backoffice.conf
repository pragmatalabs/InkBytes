# nginx reverse proxy for the InkBytes Backoffice (Laravel/Inertia)
# Traefik terminates TLS; this server listens on :80 only.
# Lesson: variable proxy_pass MUST have resolver + explicit rewrite.

server {
    listen 80;
    server_name _;
    server_tokens off;
    root /var/www/html/public;
    index index.php;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/x-javascript;

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Vite-built assets — long cache
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # php-fpm runs in the inkbytes-backoffice-fpm container on :9000
        # Docker embedded DNS resolver is required when proxy_pass uses a variable
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream http://inkbytes-backoffice-fpm:9000;
        fastcgi_pass inkbytes-backoffice-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
