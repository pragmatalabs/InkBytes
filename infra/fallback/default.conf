# InkBytes maintenance fallback — answers when the reader container is down or
# swapping (deploys). Every path returns 503 + Retry-After with the branded
# "we're updating" page, so crawlers see a correct temporary-outage signal and
# humans see InkBytes instead of Traefik's bare "404 page not found".
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    error_page 503 /index.html;

    location = /index.html {
        internal;
        add_header Cache-Control "no-store" always;
    }

    location / {
        add_header Retry-After 10 always;
        add_header Cache-Control "no-store" always;
        return 503;
    }
}
