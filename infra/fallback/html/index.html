<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<!-- Auto-retry: the reader swap takes seconds; the page reloads itself until the app answers. -->
<meta http-equiv="refresh" content="6">
<title>InkBytes — back in a moment</title>
<style>
  :root { --ink:#111; --muted:#666; --bg:#fafaf9; --accent:#1a1a2e; --dot:#e05c5c; }
  * { margin:0; box-sizing:border-box; }
  body {
    min-height:100vh; display:grid; place-items:center; background:var(--bg);
    color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; padding:24px;
  }
  .card { text-align:center; max-width:26rem; }
  .logo { font-size:1.5rem; font-weight:800; letter-spacing:-0.02em; color:var(--accent); }
  .logo b { color:var(--dot); }
  h1 { font-size:1.15rem; font-weight:700; margin:1.6rem 0 .5rem; letter-spacing:-0.01em; }
  p  { font-size:.9rem; color:var(--muted); line-height:1.6; }
  .pulse {
    display:inline-block; width:10px; height:10px; border-radius:999px; background:var(--dot);
    margin-bottom:.2rem; animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform:scale(1); opacity:1 } 50% { transform:scale(1.5); opacity:.45 } }
  @media (prefers-reduced-motion: reduce) { .pulse { animation:none } }
</style>
</head>
<body>
  <div class="card" role="status" aria-live="polite">
    <div class="logo">InkBytes<b>.</b></div>
    <h1><span class="pulse" aria-hidden="true"></span>&nbsp;We&rsquo;re updating</h1>
    <p>InkBytes is deploying a fresh version and will be back in a few seconds.
       This page retries automatically &mdash; no need to do anything.</p>
  </div>
</body>
</html>
