name: Build & Deploy InkBytes

# Only trigger when relevant service files actually change.
# infra/ changes always trigger a deploy (compose/env updates).
on:
  push:
    branches: [master, main]
    paths:
      - 'Messor/apps/scraper/**'
      - 'Messor/packages/**'
      - 'Messor/docker/**'
      - 'Messor/apps/platform/**'
      - 'Curator/**'
      - 'Reader/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip image build (deploy existing :latest — config-only changes)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Detect which services changed ───────────────────────────────────────────
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      messor:     ${{ steps.filter.outputs.messor }}
      backoffice: ${{ steps.filter.outputs.backoffice }}
      curator:    ${{ steps.filter.outputs.curator }}
      reader:     ${{ steps.filter.outputs.reader }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            messor:
              - 'Messor/apps/scraper/**'
              - 'Messor/packages/**'
              - 'Messor/docker/**'
            backoffice:
              - 'Messor/apps/platform/**'
            curator:
              - 'Curator/**'
            reader:
              - 'Reader/**'

  # ── Build: only the services whose files changed ─────────────────────────────
  build:
    name: Build & push ${{ matrix.service }}
    needs: changes
    runs-on: ubuntu-latest
    if: |
      !inputs.skip_build && (
        (matrix.service == 'messor'     && needs.changes.outputs.messor     == 'true') ||
        (matrix.service == 'backoffice' && needs.changes.outputs.backoffice == 'true') ||
        (matrix.service == 'curator'    && needs.changes.outputs.curator    == 'true') ||
        (matrix.service == 'reader'     && needs.changes.outputs.reader     == 'true')
      )
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service:    reader
            context:    Reader/apps/web
            dockerfile: Reader/apps/web/Dockerfile

          - service:    backoffice
            context:    Messor/apps/platform
            dockerfile: Messor/apps/platform/Dockerfile

          - service:    curator
            context:    Curator
            dockerfile: Curator/apps/curator/Dockerfile

          - service:    messor
            context:    Messor
            dockerfile: Messor/docker/Dockerfile   # fixed: was Messor/infra/docker/scraper.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       true
          platforms:  linux/amd64
          tags: |
            ${{ env.REGISTRY }}/inkbytes-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/inkbytes-${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/inkbytes-${{ matrix.service }}:latest
          cache-to:   type=inline

  # ── Deploy: only pull and restart changed services ───────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [changes, build]
    # Run if build passed OR was fully skipped (no services changed / skip_build)
    if: always() && needs.build.result != 'failure'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          envs:     CHANGED_MESSOR,CHANGED_BACKOFFICE,CHANGED_CURATOR,CHANGED_READER
          script: |
            set -euo pipefail
            cd /docker/inkbytes          # fixed: was /opt/inkbytes
            git pull origin master

            DEPLOY_ROOT=/docker/inkbytes
            COMPOSE="$DEPLOY_ROOT/infra/docker-compose.prod.yml"
            ENV_FILE="$DEPLOY_ROOT/infra/.env"

            # Login to GHCR if token is available
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "${GHCR_USER:-pragmatalabs}" --password-stdin 2>/dev/null || true
            fi

            # Pull and restart ONLY the services whose images were rebuilt.
            # docker compose up -d (without --force-recreate) only recreates a
            # container when its image digest changed — safe to always run.
            SERVICES=""
            [ "$CHANGED_MESSOR"     = "true" ] && SERVICES="$SERVICES inkbytes-messor"
            [ "$CHANGED_BACKOFFICE" = "true" ] && SERVICES="$SERVICES inkbytes-backoffice"
            [ "$CHANGED_CURATOR"    = "true" ] && SERVICES="$SERVICES inkbytes-curator-api inkbytes-curator-worker"
            [ "$CHANGED_READER"     = "true" ] && SERVICES="$SERVICES inkbytes-reader"

            if [ -n "$SERVICES" ]; then
              echo "[deploy] Pulling updated images for:$SERVICES"
              for svc in $SERVICES; do
                docker compose -f "$COMPOSE" --env-file "$ENV_FILE" pull "$svc" || true
              done
              echo "[deploy] Restarting:$SERVICES"
              docker compose -f "$COMPOSE" --env-file "$ENV_FILE" up -d $SERVICES
            else
              echo "[deploy] No service images changed — skipping restart."
            fi

            docker image prune -f
            echo "✓ Deploy complete"
        env:
          CHANGED_MESSOR:     ${{ needs.changes.outputs.messor }}
          CHANGED_BACKOFFICE: ${{ needs.changes.outputs.backoffice }}
          CHANGED_CURATOR:    ${{ needs.changes.outputs.curator }}
          CHANGED_READER:     ${{ needs.changes.outputs.reader }}
