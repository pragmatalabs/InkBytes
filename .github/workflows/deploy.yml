name: Build & Deploy InkBytes

on:
  push:
    branches: [master, main]
    paths:
      - 'Messor/apps/scraper/**'
      - 'Messor/packages/**'
      - 'Messor/docker/**'
      - 'Messor/apps/platform/**'
      - 'Curator/**'
      - 'Reader/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip image build (deploy existing :latest)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

# ── Detect which services changed ────────────────────────────────────────────
jobs:
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      messor:     ${{ steps.filter.outputs.messor }}
      backoffice: ${{ steps.filter.outputs.backoffice }}
      curator:    ${{ steps.filter.outputs.curator }}
      reader:     ${{ steps.filter.outputs.reader }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            messor:
              - 'Messor/apps/scraper/**'
              - 'Messor/packages/**'
              - 'Messor/docker/**'
            backoffice:
              - 'Messor/apps/platform/**'
            curator:
              - 'Curator/**'
            reader:
              - 'Reader/**'

# ── Per-service builds (only when files changed) ─────────────────────────────
  build-reader:
    name: Build reader
    needs: changes
    if: ${{ needs.changes.outputs.reader == 'true' && !inputs.skip_build }}
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context:    Reader/apps/web
          file:       Reader/apps/web/Dockerfile
          push:       true
          platforms:  linux/amd64
          tags: |
            ${{ env.REGISTRY }}/inkbytes-reader:${{ github.sha }}
            ${{ env.REGISTRY }}/inkbytes-reader:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/inkbytes-reader:latest
          cache-to:   type=inline

  build-backoffice:
    name: Build backoffice
    needs: changes
    if: ${{ needs.changes.outputs.backoffice == 'true' && !inputs.skip_build }}
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context:    Messor/apps/platform
          file:       Messor/apps/platform/Dockerfile
          push:       true
          platforms:  linux/amd64
          tags: |
            ${{ env.REGISTRY }}/inkbytes-backoffice:${{ github.sha }}
            ${{ env.REGISTRY }}/inkbytes-backoffice:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/inkbytes-backoffice:latest
          cache-to:   type=inline

  build-curator:
    name: Build curator
    needs: changes
    if: ${{ needs.changes.outputs.curator == 'true' && !inputs.skip_build }}
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context:    Curator
          file:       Curator/apps/curator/Dockerfile
          push:       true
          platforms:  linux/amd64
          tags: |
            ${{ env.REGISTRY }}/inkbytes-curator:${{ github.sha }}
            ${{ env.REGISTRY }}/inkbytes-curator:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/inkbytes-curator:latest
          cache-to:   type=inline

  build-messor:
    name: Build messor
    needs: changes
    if: ${{ needs.changes.outputs.messor == 'true' && !inputs.skip_build }}
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context:    Messor
          file:       Messor/docker/Dockerfile
          push:       true
          platforms:  linux/amd64
          tags: |
            ${{ env.REGISTRY }}/inkbytes-messor:${{ github.sha }}
            ${{ env.REGISTRY }}/inkbytes-messor:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/inkbytes-messor:latest
          cache-to:   type=inline

# ── Deploy: only pull/restart changed services ───────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [changes, build-reader, build-backoffice, build-curator, build-messor]
    if: always() && !contains(needs.*.result, 'failure')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          port:     22
          script: |
            set -euo pipefail
            cd /docker/inkbytes
            git pull origin master

            COMPOSE="infra/docker-compose.prod.yml"
            ENV_FILE="infra/.env"

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "${GHCR_USER:-pragmatalabs}" --password-stdin 2>/dev/null || true
            fi

            CHANGED_READER="${{ needs.changes.outputs.reader }}"
            CHANGED_BACKOFFICE="${{ needs.changes.outputs.backoffice }}"
            CHANGED_CURATOR="${{ needs.changes.outputs.curator }}"
            CHANGED_MESSOR="${{ needs.changes.outputs.messor }}"

            SERVICES=""
            [ "$CHANGED_READER"     = "true" ] && SERVICES="$SERVICES inkbytes-reader"
            [ "$CHANGED_BACKOFFICE" = "true" ] && SERVICES="$SERVICES inkbytes-backoffice"
            [ "$CHANGED_CURATOR"    = "true" ] && SERVICES="$SERVICES inkbytes-curator-api inkbytes-curator-worker"
            [ "$CHANGED_MESSOR"     = "true" ] && SERVICES="$SERVICES inkbytes-messor"

            if [ -n "$SERVICES" ]; then
              echo "[deploy] Pulling:$SERVICES"
              for svc in $SERVICES; do
                docker compose -f "$COMPOSE" --env-file "$ENV_FILE" pull "$svc" 2>/dev/null || true
              done
              echo "[deploy] Restarting:$SERVICES"
              docker compose -f "$COMPOSE" --env-file "$ENV_FILE" up -d $SERVICES
              echo "[deploy] Done —$SERVICES restarted"
            else
              echo "[deploy] No service images changed — skipping container restarts."
            fi

            docker image prune -f
