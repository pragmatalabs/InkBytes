name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PHP / Laravel Backoffice (Pint + Pest) ──────────────────────────────────
  quality-php:
    name: PHP — Pint & Pest (Backoffice)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: Messor/apps/platform

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: inkbytes
          POSTGRES_PASSWORD: inkbytes
          POSTGRES_DB: inkbytes_test
        ports: ["5443:5432"]
        options: >-
          --health-cmd="pg_isready -U inkbytes"
          --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, zip, gd, intl, bcmath
          coverage: none

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate app key
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5443
          DB_DATABASE: inkbytes_test
          DB_USERNAME: inkbytes
          DB_PASSWORD: inkbytes

      - name: Run migrations
        run: php artisan migrate --force
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5443
          DB_DATABASE: inkbytes_test
          DB_USERNAME: inkbytes
          DB_PASSWORD: inkbytes

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: Pest (test suite)
        run: vendor/bin/pest --parallel
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5443
          DB_DATABASE: inkbytes_test
          DB_USERNAME: inkbytes
          DB_PASSWORD: inkbytes

  # ── Next.js Reader (type-check + build) ─────────────────────────────────────
  quality-reader:
    name: Node — TypeScript & Build (Reader)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: Reader/apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Reader/apps/web/package-lock.json

      - run: npm ci
      - run: npm run build   # Next.js build catches TS errors

  # ── Python — Curator + Messor (ruff lint) ────────────────────────────────────
  quality-python:
    name: Python — Ruff lint (Curator + Messor)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff

      - name: Lint Curator
        run: ruff check Curator/apps/curator --select=E,F,W --ignore=E501
        continue-on-error: true   # advisory only until ruff config is added

      - name: Lint Messor scraper
        run: ruff check Messor/apps/scraper --select=E,F,W --ignore=E501
        continue-on-error: true
