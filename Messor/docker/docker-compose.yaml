version: "3"
services:
  messor:
    container_name: ${CONTAINER_NAME}
    tty: true
    build:
      network: host
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      # Mount project root data directory to container - bind to existing project structure
      - ../data:/app/data:rw
      # Mount project root logs directory to container - bind to existing project structure
      - ../logs:/app/logs:rw
      # Mount config file from project root
      - ../env.yaml:/app/env.yaml:ro
    ports:
      - 8585:8080
    restart: always
    environment:
      # Set Docker environment variable for detection
      - DOCKER_CONTAINER=true
      # Ensure proper permissions for data directory
      - DATA_DIR=/app/data
      - LOGS_DIR=/app/logs
    networks:
      - portainer_default
      - messor
      - rabbitmq
networks:
  messor:
    name: messor
    driver: bridge
  rabbitmq:
    name: rabbitmq
    driver: bridge
    external: true
  portainer_default:
    name: portainer_default
    driver: bridge
    external: true
