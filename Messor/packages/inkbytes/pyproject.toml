[project]
name = "inkbytes"
version = "0.1.0"
description = "Shared kernel for the InkBytes platform: common utilities, models, database adapters."
readme = "README.md"
requires-python = ">=3.10,<3.13"
authors = [
  { name = "Julian De La Rosa", email = "julian.delarosa.suncar@gmail.com" },
]
license = { text = "Proprietary" }

dependencies = [
  "pydantic>=1.10.14,<2",
  "PyYAML>=6.0.1",
  "boto3>=1.34.44",
  "requests>=2.31.0",
  "tinydb>=4.8.0",
  "pika>=1.3.2",
  "langdetect>=1.0.9",
  "newspaper3k>=0.2.8",
  "lxml_html_clean>=0.4.1",
  "python-dotenv>=1.0.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["inkbytes*"]
