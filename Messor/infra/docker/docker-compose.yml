name: ${COMPOSE_PROJECT_NAME:-messor-monorepo}

x-platform-common: &platform-common
  build:
    context: ../..
    dockerfile: infra/docker/platform/php-fpm.Dockerfile
  working_dir: /var/www/html
  env_file:
    - ../../apps/platform/.env.docker
  volumes:
    - ../../apps/platform:/var/www/html
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - messor

services:
  platform-app:
    <<: *platform-common
    container_name: ${CONTAINER_PREFIX:-messor}-platform-app
    environment:
      RUNTIME_MONITOR_ENABLED: ${RUNTIME_MONITOR_ENABLED:-true}
      RUNTIME_MONITOR_PROJECT: ${COMPOSE_PROJECT_NAME:-messor-monorepo}
      RUNTIME_MONITOR_SOCKET_PATH: /var/run/docker.sock
    volumes:
      - ../../apps/platform:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock:ro

  platform-worker:
    <<: *platform-common
    container_name: ${CONTAINER_PREFIX:-messor}-platform-worker
    command: php artisan queue:work --tries=3 --timeout=120

  platform-scheduler:
    <<: *platform-common
    container_name: ${CONTAINER_PREFIX:-messor}-platform-scheduler
    command: sh -lc "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"

  platform-node:
    build:
      context: ../..
      dockerfile: infra/docker/platform/node.Dockerfile
    container_name: ${CONTAINER_PREFIX:-messor}-platform-node
    working_dir: /var/www/html
    command: sh -lc "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_PORT: 5173
      VITE_HMR_HOST: localhost
      VITE_CLIENT_PORT: ${PLATFORM_VITE_PORT:-5173}
      VITE_DEV_SERVER_URL: http://localhost:${PLATFORM_VITE_PORT:-5173}
      VITE_APP_ORIGIN: http://localhost:${PLATFORM_HTTP_PORT:-8080}
    volumes:
      - ../../apps/platform:/var/www/html
    ports:
      - "${PLATFORM_VITE_PORT:-5173}:5173"
    depends_on:
      - platform-app
    networks:
      - messor

  platform-nginx:
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_PREFIX:-messor}-platform-nginx
    ports:
      - "${PLATFORM_HTTP_PORT:-8080}:80"
    volumes:
      - ../../apps/platform:/var/www/html
      - ./platform/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - platform-app
      - platform-node
    networks:
      - messor

  postgres:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-messor}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-messor}
      POSTGRES_USER: ${POSTGRES_USER:-messor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-messor}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - messor_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-messor} -d ${POSTGRES_DB:-messor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - messor

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_PREFIX:-messor}-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - messor

  pgadmin:
    image: dpage/pgadmin4:9.8
    container_name: ${CONTAINER_PREFIX:-messor}-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-messor}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-15050}:80"
    volumes:
      - messor_pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - messor

  scraper:
    build:
      context: ../..
      dockerfile: infra/docker/scraper.Dockerfile
    container_name: ${CONTAINER_PREFIX:-messor}-scraper
    profiles:
      - scraper
    working_dir: /workspace/apps/scraper
    volumes:
      - ../../apps/scraper:/workspace/apps/scraper
      - ../../logs:/workspace/apps/scraper/logs
      - ../../../common:/workspace/shared/common:ro
      - ../../../models:/workspace/shared/models:ro
      - ../../../database:/workspace/shared/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PYTHONPATH: /workspace/apps/scraper:/workspace/src
      MESSOR_API_BASE_URL: http://platform-nginx/api
    command:
      - sh
      - -lc
      - |
        mkdir -p /workspace/src/inkbytes
        touch /workspace/src/inkbytes/__init__.py
        ln -snf /workspace/shared/common /workspace/src/inkbytes/common
        ln -snf /workspace/shared/models /workspace/src/inkbytes/models
        ln -snf /workspace/shared/database /workspace/src/inkbytes/database
        python main.py env.yaml --schedule
    networks:
      - messor

volumes:
  messor_pg_data:
  messor_pgadmin_data:

networks:
  messor:
    name: ${MESSOR_NETWORK_NAME:-messor-net}
