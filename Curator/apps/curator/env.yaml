# Curator — production config template.
# Safe to commit: contains no secrets. All __SET_VIA_ENV__ values are
# overridden by Docker environment variables at runtime (see config.py).
# Local development: copy to env.local.yaml and fill real values.

application:
  name: Curator
  version: 0.1.0
  mode: production
  log_level: INFO
  max_concurrent_articles: 4
  config_refresh_seconds: 30

llm:
  provider: anthropic             # default; Backoffice DB overrides via 30s poll (ADR-0004)
  enrich_model: claude-haiku-4-5
  synthesize_model: claude-haiku-4-5
  max_tokens_enrich: 1500
  max_tokens_synth: 2500
  temperature: 0.2

embeddings:
  provider: ollama
  model: bge-m3
  dimensions: 1024
  base_url: __SET_VIA_ENV__      # env: EMBEDDINGS_BASE_URL → http://infra-ollama:11434/v1

clustering:
  similarity_threshold: 0.62
  min_sources_to_publish: 2
  entity_overlap_min: 1
  recent_window_hours: 48

database:
  url: __SET_VIA_ENV__           # env: DATABASE_URL
  pool_min: 2
  pool_max: 10

rabbitmq:
  url: __SET_VIA_ENV__           # env: RABBITMQ_URL
  consume_exchange: messor
  consume_queue: curator.articles-scraped
  consume_routing_key: event.article.scraped
  sessions_queue: curator.scrape-sessions
  sessions_routing_key: event.scrape.session.completed
  publish_exchange: curator
  commands_exchange: curator.commands
  commands_queue: curator.commands
  commands_routing_key: "#"

spaces:
  endpoint: __SET_VIA_ENV__      # env: S3_ENDPOINT
  key: __SET_VIA_ENV__           # env: S3_KEY
  secret: __SET_VIA_ENV__        # env: S3_SECRET
  bucket: inkbytes
  region: us-east-1

api:
  host: 0.0.0.0
  port: 8060
  cors_allow_origins:
    - "*"
