# Curator — example configuration template.
#
# Real secrets come from environment variables. This YAML carries topology
# and non-secret defaults. See docs/configuration.md.

application:
  name: Curator
  version: 0.1.0
  mode: development             # development | production
  log_level: INFO
  max_concurrent_articles: 4    # how many ENRICH calls run in parallel

llm:
  provider: anthropic            # anthropic | openai — live-switchable via Backoffice llm_provider
  enrich_model:     claude-haiku-4-5
  synthesize_model: claude-haiku-4-5
  max_tokens_enrich: 600
  max_tokens_synth: 900
  temperature: 0.2
  api_key: __SET_VIA_ENV__         # ANTHROPIC_API_KEY — used when provider=anthropic
  openai_api_key: __SET_VIA_ENV__  # OPENAI_API_KEY — used when provider=openai

embeddings:
  # Local-first (ADR-0003): a deployed Ollama serves bge-m3 over its
  # OpenAI-compatible /v1 endpoint. No key, no embedding spend, multilingual.
  # Fallback: provider=openai, model=text-embedding-3-small, dimensions=1536,
  # api_key via OPENAI_API_KEY. Env overrides: EMBEDDINGS_PROVIDER / _BASE_URL /
  # _MODEL / _DIMENSIONS.
  provider: ollama
  model: bge-m3
  dimensions: 1024
  base_url: http://localhost:11434/v1   # compose: http://ollama:11434/v1
  api_key: __SET_VIA_ENV__              # env: OPENAI_API_KEY (only for provider=openai)

clustering:
  similarity_threshold: 0.50    # cosine; bge-m3 calibrated (ADR-0017) — lower = more merging
  min_sources_to_publish: 2     # don't publish 1-source events
  entity_overlap_min: 1         # must share ≥ N entities to join a cluster
  recent_window_hours: 48       # only cluster against last N hours

database:
  url: __SET_VIA_ENV__          # env: DATABASE_URL
  pool_min: 2
  pool_max: 10

rabbitmq:
  url: __SET_VIA_ENV__          # env: RABBITMQ_URL (amqp[s]://user:pass@host/vhost)
  consume_exchange: messor      # Messor publishes here
  consume_queue: curator.articles-scraped
  consume_routing_key: "event.article.scraped"
  publish_exchange: curator     # Curator publishes its own events here

spaces:
  endpoint_url: __SET_VIA_ENV__    # env: S3_ENDPOINT
  access_key:   __SET_VIA_ENV__    # env: S3_KEY
  secret_key:   __SET_VIA_ENV__    # env: S3_SECRET
  bucket: inkbytes
  region: nyc3

api:
  host: 0.0.0.0
  port: 8060
  cors_allow_origins: ["http://localhost:3000", "http://localhost:3001"]
