<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InkBytes — Front View</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Libre+Franklin:wght@600;700;800;900&family=Spectral:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* tweakable */
    --accent: #1f57ff;
    --hl-font: "Archivo", sans-serif;
    --body-font: "Archivo", sans-serif;
    --hl-scale: 1;

    /* palette */
    --bg: #f6f5f1;
    --bg-2: #efeee8;
    --surface: #ffffff;
    --ink: #14161c;
    --ink-2: #383b43;
    --ink-3: #5d616b;
    --muted: #8a8b91;
    --muted-2: #a7a8ad;
    --line: #e4e2da;
    --line-2: #edebe3;
    --header-bg: #0f1326;
    --header-ink: #f4f5f8;
    --header-muted: #9498b0;

    /* factuality semantics */
    --fact-high: #1d8a4e;
    --fact-mixed: #c98a12;
    --fact-low: #d23f2d;

    --maxw: 1200px;
    --radius: 14px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--body-font);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: color-mix(in oklab, var(--accent) 22%, transparent); }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  .mono { font-family: "IBM Plex Mono", monospace; }

  /* ---- header ---- */
  .ib-header {
    position: sticky; top: 0; z-index: 40;
    background: var(--header-bg);
    color: var(--header-ink);
  }
  .ib-header-inner {
    max-width: var(--maxw); margin: 0 auto;
    height: 60px; padding: 0 28px;
    display: flex; align-items: center; gap: 24px;
  }
  .ib-logo {
    font-family: var(--hl-font);
    font-weight: 800; font-size: 22px; letter-spacing: -0.02em;
    display: flex; align-items: baseline; gap: 1px; cursor: pointer;
  }
  .ib-logo .dot { color: var(--accent); }
  .ib-nav { margin-left: auto; display: flex; align-items: center; gap: 26px; }
  .ib-nav a {
    font-size: 14.5px; font-weight: 500; color: var(--header-muted);
    transition: color .15s;
  }
  .ib-nav a:hover, .ib-nav a.active { color: var(--header-ink); }
  .ib-search {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.08);
    color: var(--header-muted);
    height:34px; padding:0 14px; border-radius:9px; font-size:13.5px; cursor:text; white-space:nowrap;
  }

  .ib-shell { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

  /* utility */
  .kicker {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--accent);
  }
  .dim { color: var(--muted); }

  @media (max-width: 720px) {
    .ib-header-inner { height: 54px; padding: 0 16px; gap: 14px; }
    .ib-shell { padding: 0 16px; }
    .ib-search { display: none; }
    .ib-nav { gap: 18px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="feed.jsx"></script>
  <script type="text/babel" src="event.jsx"></script>
  <script type="text/babel" src="graph.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
